<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario Vehículo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="FormularioRvehiculo.css">
</head>
<body>

    <div class="Rvehiculo">
    <h2>Registro de Vehículo</h2>

    <form action="#" method="post">

        <label for="idvehiculo">ID Vehículo:</label><br>
        <input type="number" id="idvehiculo" name="idvehiculo" required><br><br>

        <label for="codigovehiculo">Código Vehículo:</label><br>
        <input type="text" id="codigovehiculo" name="codigovehiculo" required><br><br>


        <label for="descripcionvehiculo">Descripción Vehículo:</label><br>
        <input type="text" id="descripcionvehiculo" name="descripcionvehiculo" required><br><br>

        <label for="motor">Motor:</label><br>
        <input type="text" id="motor" name="motor" required><br><br>

        <label for="cantidad_asientos">Cantidad de Asientos:</label><br>
        <input type="text" id="cantidad_asientos" name="cantidad_asientos" required><br><br>

        <label for="placa">Placa:</label><br>
        <input type="text" id="placa" name="placa" required><br><br>

        <label for="capacidad">Capacidad:</label><br>
        <input type="text" id="capacidad" name="capacidad" required><br><br>

        <label for="marca">Marca:</label><br>
        <input type="text" id="marca" name="marca" required><br><br>

        <label for="tipovehiculos_idtipovehiculo">ID Tipo Vehículo:</label><br>
        <input type="number" id="tipovehiculos_idtipovehiculo" name="tipovehiculos_idtipovehiculo" required><br><br>

        <label for="modelo">Modelo:</label><br>
        <input type="text" id="modelo" name="modelo" required><br><br>

        <input type="submit" value="Guardar Vehículo">

    </form>
    </div>

</body>
</html>
