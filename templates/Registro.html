<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro DMI</title>
  <link rel="stylesheet" href="registro.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Condensed:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

  <nav class="main-nav">
    <div class="nav-container">
      <a href="#" class="logo">Disol<span> Motors Injection</span></a>
      <ul class="nav-links">
        <li><a href="#">Inicio</a></li>
        <li><a href="#">Servicios</a></li>
        <li><a href="#">Contacto</a></li>
      </ul>
    </div>
  </nav>

  <section class="registro-section">
    <div class="registro-container">

      <div class="registro-box">
        <h2>Crear Cuenta</h2>
        <div class="title-underline"></div>

        <form class="registro-form">
          <input type="text" placeholder="Nombre completo" required>
          <input type="email" placeholder="Correo electrónico" required>
          <input type="password" placeholder="Contraseña" required>
          <input type="password" placeholder="Confirmar contraseña" required>

          <select required>
            <option value="">Selecciona tu localidad</option>
            <option>Bosa</option>
            <option>Kennedy</option>
            <option>Suba</option>
            <option>Usme</option>
          </select>

          <button type="submit" class="btn primary large">
            Registrarse
          </button>

          <p class="login-link">
            ¿Ya tienes cuenta? <a href="#">Inicia sesión</a>
          </p>
        </form>

      </div>

    </div>
  </section>

  <footer>
    <p>© 2026 Disol Motors Injection. Todos los derechos reservados.</p>
  </footer>

</body>
</html>
