<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agendar Cita | Disol Motors Injection</title>
  <link rel="stylesheet" href="/static/citas.css">

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Condensed:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

  <main class="appointment-page">
    <div class="appointment-backdrop"></div>

    <section class="appointment-panel">
      <a href="catalogo.html" class="close-button" aria-label="Cerrar formulario">X</a>

      <p class="form-step">Reserva personalizada</p>
      <h1>Agendar cita</h1>

      <form class="appointment-form">
        <div class="form-section">
          <h2>Datos del cliente</h2>

          <div class="form-grid">
            <div class="field-group">
              <label for="nombre">Nombre completo</label>
              <input type="text" id="nombre" name="nombre" placeholder="Nombre completo" required>
            </div>

            <div class="field-group">
              <label for="telefono">Telefono</label>
              <input type="tel" id="telefono" name="telefono" placeholder="Telefono" required>
            </div>

            <div class="field-group full">
              <label for="correo">Correo electronico</label>
              <input type="email" id="correo" name="correo" placeholder="Correo electronico" required>
            </div>
          </div>
        </div>

        <div class="form-section">
          <h2>Detalles de la cita</h2>

          <div class="form-grid">
            <div class="field-group">
              <label for="fecha">Fecha</label>
              <input type="date" id="fecha" name="fecha" required>
            </div>

            <div class="field-group">
              <label for="hora">Hora</label>
              <input type="time" id="hora" name="hora" required>
            </div>

            <div class="field-group full">
              <label for="servicio">Servicio</label>
              <select id="servicio" name="servicio" required>
                <option value="">Selecciona un servicio</option>
                <option value="diagnostico">Diagnostico automotriz</option>
                <option value="inyeccion">Revision de inyeccion</option>
                <option value="mantenimiento">Mantenimiento general</option>
                <option value="compra">Asesoria de compra</option>
              </select>
            </div>
          </div>
        </div>

        <div class="form-section">
          <h2>Vehiculo de interes</h2>

          <div class="service-options">
            <label class="option-card">
              <input type="radio" name="vehiculo" value="deportivo" checked>
              <span class="option-icon">GT</span>
              <span>Deportivo</span>
            </label>

            <label class="option-card">
              <input type="radio" name="vehiculo" value="suv">
              <span class="option-icon">SUV</span>
              <span>SUV premium</span>
            </label>

            <label class="option-card">
              <input type="radio" name="vehiculo" value="electrico">
              <span class="option-icon">EV</span>
              <span>Electrico</span>
            </label>

            <label class="option-card">
              <input type="radio" name="vehiculo" value="lujo">
              <span class="option-icon">LX</span>
              <span>Lujo</span>
            </label>
          </div>
        </div>

        <div class="field-group">
          <label for="mensaje">Mensaje adicional</label>
          <textarea id="mensaje" name="mensaje" placeholder="Cuéntanos que necesitas revisar o conocer"></textarea>
        </div>

        <div class="summary-box">
          <span>Estado de reserva</span>
          <strong>Pendiente</strong>
        </div>

        <button type="submit" class="submit-button">Confirmar cita</button>
      </form>
    </section>
  </main>

</body>
</html>
