
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agendar Cita | Disol Motors Injection</title>
  <link rel="stylesheet" href="/static/citas.css">

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Condensed:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

  <main class="appointment-page">
    <div class="appointment-backdrop"></div>

    <section class="appointment-panel">
      <a href="/" class="close-button" id="closeAppointment" aria-label="Cerrar formulario">X</a>

      <p class="form-step">Reserva personalizada</p>
      <h1>Agendar cita</h1>

      <form class="appointment-form" id="appointmentForm">
        <div class="appointment-layout">

          <div class="form-column">
            <div class="form-section">
              <h2>Datos del cliente</h2>

              <div class="form-grid">
                <div class="field-group">
                  <label for="nombre">Nombre completo</label>
                  <input type="text" id="nombre" name="nombre" placeholder="Nombre completo" required>
                </div>

                <div class="field-group">
                  <label for="telefono">Telefono</label>
                  <input type="tel" id="telefono" name="telefono" placeholder="Telefono" required>
                </div>

                <div class="field-group full">
                  <label for="correo">Correo electronico</label>
                  <input type="email" id="correo" name="correo" placeholder="Correo electronico" required>
                </div>
              </div>
            </div>

            <div class="form-section">
              <h2>Servicio</h2>

              <div class="form-grid">
                <div class="field-group full">
                  <label for="servicio">Servicio</label>
                  <select id="servicio" name="servicio" required>
                    <option value="">Selecciona un servicio</option>
                    <option value="diagnostico">Diagnostico automotriz</option>
                    <option value="inyeccion">Revision de inyeccion</option>
                    <option value="mantenimiento">Mantenimiento general</option>
                    <option value="compra">Asesoria de compra</option>
                  </select>
                </div>
              </div>
            </div>

            <div class="form-section">
              <h2>Vehiculo de interes</h2>

              <div class="service-options">
                <label class="option-card">
                  <input type="radio" name="vehiculo" value="Deportivo" checked>
                  <span class="option-icon">GT</span>
                  <span>Deportivo</span>
                </label>

                <label class="option-card">
                  <input type="radio" name="vehiculo" value="SUV premium">
                  <span class="option-icon">SUV</span>
                  <span>SUV premium</span>
                </label>

                <label class="option-card">
                  <input type="radio" name="vehiculo" value="Electrico">
                  <span class="option-icon">EV</span>
                  <span>Electrico</span>
                </label>

                <label class="option-card">
                  <input type="radio" name="vehiculo" value="Lujo">
                  <span class="option-icon">LX</span>
                  <span>Lujo</span>
                </label>
              </div>
            </div>

            <div class="field-group">
              <label for="mensaje">Mensaje adicional</label>
              <textarea id="mensaje" name="mensaje" placeholder="Cuentanos que necesitas revisar o conocer"></textarea>
            </div>

            <div class="summary-box">
              <span>Estado de reserva</span>
              <strong id="estadoReserva">Pendiente</strong>
            </div>

            <button type="submit" class="submit-button">Confirmar cita</button>
          </div>

          <div class="calendar-column">
            <div class="calendar-module">
              <div class="calendar-header">
                <button type="button" class="calendar-nav" id="prevMonth">‹</button>
                <h2 id="calendarTitle">Mes 2026</h2>
                <button type="button" class="calendar-nav" id="nextMonth">›</button>
              </div>

              <div class="calendar-weekdays">
                <span>D</span>
                <span>L</span>
                <span>M</span>
                <span>X</span>
                <span>J</span>
                <span>V</span>
                <span>S</span>
              </div>

              <div class="calendar-days" id="calendarDays"></div>

              <input type="hidden" id="fecha" name="fecha" required>

              <div class="selected-date-box">
                <span>Fecha seleccionada</span>
                <strong id="selectedDateText">Selecciona un dia</strong>
              </div>

              <div class="hour-section">
                <h2>Hora disponible</h2>

                <div class="time-options">
                  <label>
                    <input type="radio" name="hora" value="08:00" required>
                    <span>08:00</span>
                  </label>

                  <label>
                    <input type="radio" name="hora" value="09:00">
                    <span>09:00</span>
                  </label>

                  <label>
                    <input type="radio" name="hora" value="10:00">
                    <span>10:00</span>
                  </label>

                  <label>
                    <input type="radio" name="hora" value="11:00">
                    <span>11:00</span>
                  </label>

                  <label>
                    <input type="radio" name="hora" value="14:00">
                    <span>14:00</span>
                  </label>

                  <label>
                    <input type="radio" name="hora" value="15:00">
                    <span>15:00</span>
                  </label>
                </div>
              </div>
            </div>

            <details class="appointments-list">
              <summary>Citas guardadas</summary>

              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>Cliente</th>
                      <th>Fecha</th>
                      <th>Hora</th>
                      <th>Servicio</th>
                    </tr>
                  </thead>
                  <tbody id="appointmentsTable">
                    <tr>
                      <td colspan="4">Todavia no hay citas guardadas</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </details>
          </div>

        </div>
      </form>
    </section>
  </main>

  <script>
    const form = document.getElementById("appointmentForm");
    const estadoReserva = document.getElementById("estadoReserva");
    const calendarTitle = document.getElementById("calendarTitle");
    const calendarDays = document.getElementById("calendarDays");
    const selectedDateText = document.getElementById("selectedDateText");
    const fechaInput = document.getElementById("fecha");
    const appointmentsTable = document.getElementById("appointmentsTable");

    const monthNames = [
      "Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio",
      "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"
    ];

    let currentDate = new Date();
    let selectedDate = null;

    function formatDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");

      return `${year}-${month}-${day}`;
    }

    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();

      calendarTitle.textContent = `${monthNames[month]} de ${year}`;
      calendarDays.innerHTML = "";

      const firstDay = new Date(year, month, 1).getDay();
      const lastDate = new Date(year, month + 1, 0).getDate();
      const prevLastDate = new Date(year, month, 0).getDate();

      for (let i = firstDay; i > 0; i--) {
        const day = document.createElement("button");
        day.type = "button";
        day.className = "calendar-day muted";
        day.textContent = prevLastDate - i + 1;
        calendarDays.appendChild(day);
      }

      for (let dayNumber = 1; dayNumber <= lastDate; dayNumber++) {
        const day = document.createElement("button");
        const dayDate = new Date(year, month, dayNumber);
        const dateValue = formatDate(dayDate);

        day.type = "button";
        day.className = "calendar-day";
        day.textContent = dayNumber;

        if (dateValue === formatDate(new Date())) {
          day.classList.add("today");
        }

        if (selectedDate === dateValue) {
          day.classList.add("selected");
        }

        day.addEventListener("click", function () {
          selectedDate = dateValue;
          fechaInput.value = dateValue;
          selectedDateText.textContent = dateValue;
          renderCalendar();
        });

        calendarDays.appendChild(day);
      }

      const totalCells = calendarDays.children.length;
      const nextDays = 42 - totalCells;

      for (let i = 1; i <= nextDays; i++) {
        const day = document.createElement("button");
        day.type = "button";
        day.className = "calendar-day muted";
        day.textContent = i;
        calendarDays.appendChild(day);
      }
    }

    function getAppointments() {
      return JSON.parse(localStorage.getItem("citasGuardadas")) || [];
    }

    function saveAppointments(appointments) {
      localStorage.setItem("citasGuardadas", JSON.stringify(appointments));
    }

    function renderAppointmentsTable() {
      const appointments = getAppointments();

      if (appointments.length === 0) {
        appointmentsTable.innerHTML = `
          <tr>
            <td colspan="4">Todavia no hay citas guardadas</td>
          </tr>
        `;
        return;
      }

      appointmentsTable.innerHTML = appointments.map(function (appointment) {
        return `
          <tr>
            <td>${appointment.nombre}</td>
            <td>${appointment.fecha}</td>
            <td>${appointment.hora}</td>
            <td>${appointment.servicio}</td>
          </tr>
        `;
      }).join("");
    }

    document.getElementById("prevMonth").addEventListener("click", function () {
      currentDate.setMonth(currentDate.getMonth() - 1);
      renderCalendar();
    });

    document.getElementById("nextMonth").addEventListener("click", function () {
      currentDate.setMonth(currentDate.getMonth() + 1);
      renderCalendar();
    });

    document.getElementById("closeAppointment").addEventListener("click", function (event) {
      event.preventDefault();

      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = "/";
      }
    });

    form.addEventListener("submit", function (event) {
      event.preventDefault();

      if (!fechaInput.value) {
        alert("Selecciona una fecha en el calendario");
        return;
      }

      const datos = Object.fromEntries(new FormData(form).entries());
      const appointments = getAppointments();

      appointments.push(datos);
      saveAppointments(appointments);

      estadoReserva.textContent = "Confirmada";
      renderAppointmentsTable();

      alert("Cita guardada correctamente");
      form.reset();

      selectedDate = null;
      fechaInput.value = "";
      selectedDateText.textContent = "Selecciona un dia";
      renderCalendar();

      setTimeout(function () {
        estadoReserva.textContent = "Pendiente";
      }, 1800);
    });

    renderCalendar();
    renderAppointmentsTable();
  </script>

</body>
</html>
