<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración — DMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --navy: #0a2540; --accent: #0d6efd; }
        body { background-color: #f8f9fa; }
        
        /* Sidebar mejorado con Bootstrap */
        .sidebar { min-height: 100vh; background: var(--navy); }
        .sidebar .nav-link { color: #adb5bd; border-radius: 0; border-left: 3px solid transparent; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background: rgba(255,255,255,.05); border-left-color: var(--accent); }
        .sidebar .section-label { color: #6c757d; font-size: 0.75rem; text-transform: uppercase; font-weight: bold; letter-spacing: 0.05rem; }
        
        .main-content { background: #e9ecef; min-height: 100vh; }
        .cfg-panel { display: none; }
        .cfg-panel.active { display: block; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
    <a class="navbar-brand fw-bold" href="#">DMI Sistema</a>
    <div class="navbar-nav ms-auto">
        <a class="nav-link" href="/">Vehículos</a>
        <a class="nav-link" href="/citas">Citas</a>
        <a class="nav-link active" href="/configuracion">Panel de Administrador</a>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-3 col-lg-2 d-md-block sidebar p-3">
            <div class="section-label mb-2 mt-3">Catálogos</div>
            <ul class="nav flex-column">
                <li class="nav-item"><a href="#" class="nav-link active" onclick="show('ciudades', this)">Ciudades</a></li>
                <li class="nav-item"><a href="#" class="nav-link" onclick="show('tipovehiculos', this)">Tipo Vehículos</a></li>
            </ul>
            </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4 main-content">
            <div id="panel-ciudades" class="cfg-panel active">
                <div class="row">
                    <div class="col-lg-4">
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <h5 class="card-title fw-bold text-primary mb-3">🏙 Nueva Ciudad</h5>
                                </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function show(panelId, element) {
        document.querySelectorAll('.cfg-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.sidebar .nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById('panel-' + panelId).classList.add('active');
        element.classList.add('active');
    }
</script>
</body>
</html>
